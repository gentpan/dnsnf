version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giantaccel-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - PORT=8080
      - HTTP_READ_TIMEOUT=10s
      - HTTP_WRITE_TIMEOUT=10s
      - HTTP_IDLE_TIMEOUT=60s
      - HTTP_SHUTDOWN_GRACE=10s
      - POSTGRES_DSN=postgres://postgres:${DB_PASSWORD}@postgres:5432/dns_platform?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - DNS_UPSTREAM=1.1.1.1:53
      - CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
    depends_on:
      - postgres
      - redis
    networks:
      - giantaccel-network

  postgres:
    image: postgres:16-alpine
    container_name: giantaccel-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=dns_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - giantaccel-network

  redis:
    image: redis:7-alpine
    container_name: giantaccel-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - giantaccel-network

volumes:
  postgres_data:
  redis_data:

networks:
  giantaccel-network:
    driver: bridge
